name: Release

# Auto-cuts a patch release on every push to main that touches source code.
# Use the workflow_dispatch input to force a minor or major bump.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "cli/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - working-directory: cli
        run: |
          go vet ./...
          go test ./...

  tag:
    name: Tag release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - id: tag
        env:
          BUMP_KIND: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          latest=""
          while IFS= read -r candidate; do
            if [[ "$candidate" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              latest="$candidate"
              break
            fi
          done < <(git tag --list "v*" --sort=-v:refname)

          if [ -z "$latest" ]; then
            current="0.0.0"
          else
            current="${latest#v}"
          fi

          IFS=. read -r major minor patch <<<"$current"
          case "$BUMP_KIND" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch|*) patch=$((patch+1)) ;;
          esac

          next="$major.$minor.$patch"
          tag="v$next"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists."
            exit 1
          fi

          echo "Tagging $tag from latest release $current ($BUMP_KIND)"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"

          sha="$(git rev-parse "${tag}^{commit}")"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  build-wheel:
    name: Build Python wheel
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-cli:
    name: Build skill-registry ${{ matrix.os }}/${{ matrix.arch }}
    needs: tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${{ needs.tag.outputs.version }}"
          out="skill-registry"
          if [ "$GOOS" = "windows" ]; then out="skill-registry.exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${out}" ./cmd/skill-registry
          if [ "$GOOS" = "darwin" ]; then
            # Ad-hoc codesign so macOS Gatekeeper doesn't SIGKILL the
            # binary on users' Macs. Downloaded binaries pick up the
            # `com.apple.provenance` xattr on Sonoma+/Sequoia, and any
            # unsigned Mach-O with that marker is killed on first exec.
            # Ad-hoc (-) signatures aren't notarized but are enough to
            # bypass the provenance kill path for user-installed CLIs.
            codesign --force --sign - "dist/${out}"
          fi
          archive="skill-registry_${GOOS}_${GOARCH}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "${archive}.zip" "$out"
          else
            tar czf "${archive}.tar.gz" "$out"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            cli/dist/skill-registry_*.tar.gz
            cli/dist/skill-registry_*.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub release
    needs: [tag, build-wheel, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.tag.outputs.tag }}"
          notes=$(printf '%s\n' \
            "Automated release for \`$tag\`." \
            "" \
            "* Python wheel: published to https://pypi.org/project/skills-registry/${tag#v}/" \
            "* Go CLI binaries for darwin/amd64, darwin/arm64, linux/amd64, linux/arm64, windows/amd64 are attached." \
            "" \
            "\`skills-registry init\` downloads the right CLI binary from the *latest* release; this is it.")
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" --title "$tag" --notes "$notes" artifacts/*
          fi

  pypi:
    name: Publish wheel to PyPI
    needs: [tag, build-wheel, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skills-registry
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

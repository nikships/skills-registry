name: Release

# Auto-cuts a patch release on every push to main that touches the Go CLI.
# Use the workflow_dispatch input to force a minor or major bump.
#
# The hosted MCP server (infa-not-for-users/) is NOT released here — it
# auto-deploys to Railway on every push to main and carries no version tag.
on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "install.sh"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Install Go analyzers
        # Pinned for reproducibility; bump intentionally with a separate PR.
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          go install golang.org/x/tools/cmd/deadcode@v0.45.0
          go install github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0
      - working-directory: cli
        run: |
          go vet ./...
          staticcheck ./...
          deadcode -test ./...
          gocyclo -over 15 -ignore "_test" .
          go test ./...

  tag:
    name: Tag release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - id: tag
        env:
          BUMP_KIND: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          latest=""
          while IFS= read -r candidate; do
            if [[ "$candidate" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              latest="$candidate"
              break
            fi
          done < <(git tag --list "v*" --sort=-v:refname)

          if [ -z "$latest" ]; then
            current="0.0.0"
          else
            current="${latest#v}"
          fi

          IFS=. read -r major minor patch <<<"$current"
          case "$BUMP_KIND" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch|*) patch=$((patch+1)) ;;
          esac

          next="$major.$minor.$patch"
          tag="v$next"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists."
            exit 1
          fi

          echo "Tagging $tag from latest release $current ($BUMP_KIND)"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"

          sha="$(git rev-parse "${tag}^{commit}")"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  build-cli:
    name: Build skills-registry ${{ matrix.os }}/${{ matrix.arch }}
    needs: tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Import codesigning certificate
        if: matrix.os == 'darwin'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${{ needs.tag.outputs.version }}"
          out="skills-registry"
          if [ "$GOOS" = "windows" ]; then out="skills-registry.exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${out}" ./cmd/skills-registry
      - name: Sign and notarize (darwin)
        if: matrix.os == 'darwin'
        working-directory: cli/dist
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          out="skills-registry"
          # Hardened-runtime + secure timestamp + Developer ID signature.
          # Required for notarization; replaces the previous ad-hoc sign
          # which couldn't bypass the com.apple.provenance kill path on
          # downloaded binaries.
          codesign --force \
            --options runtime \
            --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            "$out"
          codesign --verify --strict --verbose=2 "$out"
          # Notarize. notarytool wants a zip; --wait blocks until Apple
          # accepts or rejects. We cannot `stapler staple` a bare Mach-O
          # (only .app/.dmg/.pkg), but once the CDHash is in Apple's
          # ticket service, macOS performs a one-time online check on
          # first launch and caches the result.
          ditto -c -k --keepParent "$out" "${out}.notarize.zip"
          submit_output="$(xcrun notarytool submit "${out}.notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait --output-format json)"
          echo "$submit_output"
          status="$(printf '%s' "$submit_output" | python3 -c 'import json,sys;print(json.load(sys.stdin)["status"])')"
          if [ "$status" != "Accepted" ]; then
            submission_id="$(printf '%s' "$submit_output" | python3 -c 'import json,sys;print(json.load(sys.stdin)["id"])')"
            echo "::error::Notarization failed with status: $status"
            xcrun notarytool log "$submission_id" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          rm "${out}.notarize.zip"
      - name: Package archive
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          out="skills-registry"
          if [ "$GOOS" = "windows" ]; then out="skills-registry.exe"; fi
          archive="skills-registry_${GOOS}_${GOARCH}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "${archive}.zip" "$out"
          else
            tar czf "${archive}.tar.gz" "$out"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            cli/dist/skills-registry_*.tar.gz
            cli/dist/skills-registry_*.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub release
    needs: [tag, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.tag.outputs.tag }}"
          notes=$(printf '%s\n' \
            "Automated release for \`$tag\`." \
            "" \
            "* Go CLI binaries for darwin/amd64, darwin/arm64, linux/amd64, linux/arm64, windows/amd64 are attached." \
            "" \
            "\`install.sh\` downloads the right CLI binary from the *latest* release; this is it.")
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" --title "$tag" --notes "$notes" artifacts/*
          fi

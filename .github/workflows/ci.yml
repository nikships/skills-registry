name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  python:
    name: Python (lint, format, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -v --cov=skills_mcp --cov-report=xml

  go:
    name: Go CLI (build, vet, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - run: go mod download
      - run: go vet ./...
      - name: Check gofmt formatting
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
      - name: Run staticcheck (dead code + unused symbols)
        run: staticcheck ./...
      - name: Install deadcode
        # Pinned for reproducibility; bump intentionally with a separate PR.
        run: go install golang.org/x/tools/cmd/deadcode@v0.45.0
      - name: Run deadcode analyzer
        run: deadcode -test ./...
      - run: go build ./...
      - run: go test ./...

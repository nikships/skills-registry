# Staticcheck configuration for the skills-registry Go CLI.
#
# Scope: dead-code detection + correctness checks. The signal we're
# answering here is "tooling detects unused/dead code", so we enable
# every U-prefixed unused-code check and the SA-series correctness
# checks. The ST style checks (e.g. ST1005 error-message punctuation)
# are intentionally excluded to keep this PR focused on dead code.
#
# Documentation: https://staticcheck.dev/docs/configuration/options/
checks = [
    "all",
    "-ST*",
    "-QF*",
]
